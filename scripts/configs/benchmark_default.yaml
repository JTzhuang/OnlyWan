test_mode: "standard"

test_cases:
  - name: "standard_video_generation"
    description: "标准视频生成测试"
    resolutions:
      - "512x512"
      - "768x768"
      - "1024x576"
    steps:
      - 20
      - 50
    prompts:
      - "A cat playing with a ball"
      - "An astronaut on the moon"
    num_frames: 16

gpu_config:
  auto_detect: true
  min_required: 1
  max_gpus: null
  configurations: [1, 2]  # 测试的GPU数量配置
  prefer_gpus: [0, 1, 2, 3]  # 优先使用的GPU ID列表

execution:
  mode: "sequential"  # sequential | parallel
  timeout_per_test: 600  # 单位：秒
  retry_on_failure: 0

output:
  format: ["json", "csv", "html"]
  save_dir: "./benchmark_results"
  auto_name: true
  include_raw_output: false

metrics:
  collect_memory: true
  collect_comm_bandwidth: true  # 估算多GPU通讯带宽（仅近似值）
  collect_power: false
