test_mode: "quick"

test_cases:
  - name: "quick_verification"
    resolutions: ["512x512"]
    steps: [10]
    prompts: ["A cat"]
    num_frames: 8

gpu_config:
  auto_detect: true
  configurations: [1]

execution:
  mode: "sequential"
  timeout_per_test: 300
  retry_on_failure: 0

output:
  format: ["json", "html"]
  save_dir: "./benchmark_results"
  auto_name: true

metrics:
  collect_memory: true
  collect_comm_bandwidth: false
  collect_power: false
